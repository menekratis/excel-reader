<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel Reader</title>
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <main class="app">
    <h1>Excel Reader</h1>

    <p class="hint">
      The default list loads automatically. You can also upload another Excel file.
    </p>

    <input type="file" id="fileInput" accept=".xlsx, .xls" />

    <div id="sheetButtons"></div>

    <div id="tableContainer">
      <p class="empty-message">Loading default data...</p>
    </div>
  </main>

  <script src="libs/xlsx.full.min.js"></script>
  <script src="default-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
